  <text x="680.0" y="56" text-anchor="middle" class="title">HMI Server Transport: Current vs Recommended</text>
  <text x="680.0" y="82" text-anchor="middle" class="subtitle">Current code is acceptable as a transition skeleton, but production runtime should move to HTTP + WebSocket and a mature transport stack.</text>
