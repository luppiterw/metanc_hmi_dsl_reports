<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex Local Conversation Export</title>
<style>:root {
  color-scheme: light;
  --bg: #f7f3ea;
  --panel: #fffaf0;
  --ink: #1d1b16;
  --muted: #6b6255;
  --line: #d7c9b2;
  --user: #153f52;
  --assistant: #5b2f1f;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: radial-gradient(circle at top left, #fff6d7, transparent 35%), var(--bg);
  color: var(--ink);
  font: 16px/1.55 ui-serif, Georgia, "Times New Roman", serif;
}
main { max-width: 1120px; margin: 0 auto; padding: 32px 18px 72px; }
h1 { font-size: clamp(28px, 5vw, 54px); line-height: 1.05; margin: 0 0 22px; letter-spacing: -0.04em; }
h2 { margin: 0 0 8px; font-size: 20px; }
a { color: #8a3a19; }
code, pre {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
}
.meta {
  background: rgba(255,250,240,0.82);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px 18px;
  margin: 0 0 24px;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(255,250,240,0.82);
  border: 1px solid var(--line);
}
th, td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}
th { background: #efe2ca; position: sticky; top: 0; }
.msg {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 16px;
  margin: 18px 0;
  background: rgba(255,250,240,0.88);
}
.msg.user { border-left: 8px solid var(--user); }
.msg.assistant { border-left: 8px solid var(--assistant); }
.time { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
pre {
  white-space: pre-wrap;
  word-break: break-word;
  background: #1f211d;
  color: #f5eddc;
  padding: 14px;
  border-radius: 14px;
  overflow: auto;
}
.session {
  border-top: 4px double var(--line);
  margin-top: 44px;
  padding-top: 24px;
}
@media (max-width: 760px) {
  table { display: block; overflow-x: auto; }
  main { padding: 22px 12px 48px; }
}</style>
</head>
<body>
<main>
<h1>Codex Local Conversation Export</h1>

</section>

</table>

</html>
